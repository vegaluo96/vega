# P0 横切基建：每次 push/PR 跑 typecheck + 测试 + 一键自检。红了挡合并。
name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run check
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm ci
        working-directory: web-admin
      - run: npm run build
        working-directory: web-admin
