name: deploy

# 自动部署：main 有推送 → SSH 到生产服务器执行智能升级脚本（deploy/update.sh：
# 前端改动不重启 daemon、微信不掉；引擎改动才重启并自动重连）。
# 需要在仓库 Settings → Secrets and variables → Actions 配三个 secret：
#   DEPLOY_HOST  服务器地址（IP 或域名）
#   DEPLOY_USER  登录用户（需能 sudo systemctl restart vega，建议 sudoers 加 NOPASSWD 单条）
#   DEPLOY_KEY   该用户的 SSH 私钥（建议专用 deploy key，只授权这台机）
# 未配 secrets 时本工作流直接跳过（不报红），不影响 CI。

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检查 secrets 是否已配置
        id: gate
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$HOST" ]; then echo "skip=1" >> "$GITHUB_OUTPUT"; echo "未配置 DEPLOY_* secrets，跳过部署。"; fi

      - name: SSH 部署
        if: steps.gate.outputs.skip != '1'
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 "$USER@$HOST" \
            'cd /opt/vega && bash deploy/update.sh'
